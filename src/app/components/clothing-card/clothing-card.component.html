<article class="card">
  <div class="card__image-wrap">
    <img class="card__image" [src]="item.imagePath" [alt]="item.name" />
    <span class="card__season">{{ item.season }}</span>
    <span class="card__status" [class.card__status--laundry]="item.availability === 'Laundry'">
      {{ item.availability }}
    </span>
    <div class="card__actions">
      <button class="card__action-btn" [class.card__action-btn--favorite]="item.isFavorite" type="button"
        (click)="onFavoriteToggle()" [attr.aria-label]="item.isFavorite ? 'Remove from favorites' : 'Add to favorites'">
        <span *ngIf="item.isFavorite" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 21.35L10.55 20.03C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5C22 12.27 18.6 15.36 13.45 20.03L12 21.35Z"
              fill="currentColor" />
          </svg>
        </span>
        <span *ngIf="!item.isFavorite" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12.1 18.55L12 18.65L11.89 18.55C7.14 14.24 4 11.39 4 8.5C4 6.5 5.5 5 7.5 5C9.04 5 10.54 6 11.07 7.36H12.93C13.46 6 14.96 5 16.5 5C18.5 5 20 6.5 20 8.5C20 11.39 16.86 14.24 12.1 18.55ZM16.5 3C14.76 3 13.09 3.81 12 5.08C10.91 3.81 9.24 3 7.5 3C4.42 3 2 5.41 2 8.5C2 12.27 5.4 15.36 10.55 20.03L12 21.35L13.45 20.03C18.6 15.36 22 12.27 22 8.5C22 5.41 19.58 3 16.5 3Z"
              fill="currentColor" />
          </svg>
        </span>
      </button>

      <button class="card__action-btn card__action-btn--danger" type="button" aria-label="Remove from wardrobe"
        (click)="onRemove()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M16 9V19H8V9H16ZM14.5 3H9.5L8.5 4H5V6H19V4H15.5L14.5 3ZM18 7H6V19C6 20.1 6.9 21 8 21H16C17.1 21 18 20.1 18 19V7Z"
            fill="currentColor" />
        </svg>

      </button>

      <button class="card__action-btn card__action-btn--wear" type="button" (click)="onMarkWorn()"
        aria-label="Mark as worn">
        <span class="card__action-label">Wear</span>
      </button>
    </div>
  </div>

  <div class="card__body">
    <div class="card__heading">
      <p class="card__category">{{ item.category }}</p>
      <h3 class="card__title">{{ item.name }}</h3>
      <p class="card__brand">{{ item.brand }}</p>
    </div>

    <dl class="card__meta">
      <div>
        <dt>Color</dt>
        <dd>{{ item.color }}</dd>
      </div>
      <div>
        <dt>Style</dt>
        <dd>{{ item.style }}</dd>
      </div>
      <div>
        <dt>Last worn</dt>
        <dd class="card__meta-value card__meta-value--clamp">{{ item.lastWornLabel }}</dd>
      </div>
    </dl>
  </div>
</article>
